<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Blomklassificering</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f7f6; }
        .status-box { padding: 15px; margin: 20px auto; width: 300px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Blomklassificering</h1>
    <div class="status-box">
        Modellstatus: <span id="status">Väntar på systemet... ⏳</span>
    </div>

    <input type="file" id="imageUpload" accept="image/*">
    <div id="result" style="margin-top: 20px;"></div>

    <p><strong>Skapad av Vincent Sjöberg – NA23C</strong></p>

    <script>
        async function loadModel() {
            const statusLabel = document.getElementById('status');
            
            try {
                // Vi väntar 1 sekund så att webbläsaren hinner vakna
                statusLabel.textContent = "Ansluter till modellen... 📡";
                
                // VIKTIGT: Sökvägen måste matcha ditt mappnamn exakt
                const model = await tf.loadLayersModel('tjfs_model/model.json');
                
                statusLabel.textContent = "Klar att använda ✅";
                statusLabel.className = "success";
                console.log("Modellen är laddad och redo!");
            } catch (error) {
                statusLabel.textContent = "Fel vid laddning ❌";
                statusLabel.className = "error";
                console.error("DETTA ÄR FELET:", error);
            }
        }

        // Kör funktionen när sidan laddats klart
        window.onload = () => {
            setTimeout(loadModel, 1000);
        };
    </script>
</body>
</html>
