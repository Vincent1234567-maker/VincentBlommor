<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Blomklassificering AI</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

h1{
color:#2c3e50;
}

#status{
background:white;
padding:15px;
border-radius:10px;
width:320px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

#preview{
margin-top:20px;
max-width:300px;
}

#result{
margin-top:20px;
font-size:22px;
}

footer{
margin-top:60px;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<h1>Blomklassificering</h1>

<div id="status">
Modellstatus: <span id="modelStatus">Startar...</span>
</div>

<br>

<input type="file" id="imageUpload" accept="image/*">

<br>

<img id="preview">

<div id="result"></div>

<footer>
Skapad av Vincent Sjöberg – NA23C
</footer>

<script>

let model;

const classes = [
"ros",
"tulpan",
"maskros",
"solros",
"prästkrage"
];

async function loadModel(){

const status = document.getElementById("modelStatus");

try{

status.innerText = "Laddar modell...";

model = await tf.loadGraphModel("./tfjs_model/model.json");

status.innerText = "Modell laddad ✅";

}catch(error){

status.innerText = "Fel vid laddning ❌";

console.error("Modellfel:", error);

}

}

loadModel();


document.getElementById("imageUpload").addEventListener("change", function(event){

const file = event.target.files[0];

const img = document.getElementById("preview");

img.src = URL.createObjectURL(file);

img.onload = function(){

predict(img);

}

});


async function predict(image){

if(!model){
alert("Modellen är inte laddad ännu.");
return;
}

let tensor = tf.browser.fromPixels(image)
.resizeNearestNeighbor([224,224])
.toFloat()
.div(255)
.expandDims();

let prediction = await model.predict(tensor).data();

let maxIndex = prediction.indexOf(Math.max(...prediction));

let probability = (prediction[maxIndex]*100).toFixed(2);

document.getElementById("result").innerHTML =
"Blomma: <b>" + classes[maxIndex] + "</b><br>Sannolikhet: "+probability+"%";

}

</script>

</body>
</html>
